<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>From Babai 🤍💋</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff6fa5,#ffd6e7);
    overflow:auto;
    padding:30px;
}

.container{
    text-align:center;
}

h1{
    color:white;
    margin-bottom:30px;
    font-size:40px;
}

.cards{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    width:240px;
    height:360px;
    position:relative;
    transform-style:preserve-3d;
    transition:1s;
    cursor:pointer;
}

.card.flip{
    transform:rotateY(180deg);
}

.front,.back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:22px;
    backface-visibility:hidden;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.front img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.back{
    background:white;
    color:#ff4f8b;
    transform:rotateY(180deg);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    font-size:22px;
    line-height:1.5;
}

.final-message{
    margin-top:35px;
    color:white;
    font-size:38px;
    font-weight:bold;
}

.tap{
    color:white;
    margin-bottom:20px;
    font-size:18px;
}

.heart{
    position:fixed;
    color:white;
    animation:float 6s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh) scale(0);opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-10vh) scale(1.5);opacity:0;}
}
</style>
</head>

<script>
function flipCard(card){
    card.classList.toggle("flip");

function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");

    const symbols=["🤍","💋"];
    heart.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+18)+"px";
    heart.style.animationDuration=(Math.random()*3+3)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{heart.remove();},6000);
}
